<style>

:root {
    --main:#473144;
    --red:#C3475F;
    --orange:#D88A6A;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    height:100%;
}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#473144 0%,#AF1B3F 50%,#DF9B6D 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

/* Conteneur */
.container{
    text-align:center;
}

/* Logo */
.logo{
    font-size:72px;
    font-weight:700;
    letter-spacing:8px;
    margin-bottom:20px;
    animation:fadeIn 1s ease-in-out;
}

/* Teaser */
.teaser{
    font-size:18px;
    opacity:0.9;
    letter-spacing:2px;
    animation:fadeIn 1.5s ease-in-out;
}

/* Animation */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Mobile */
@media (max-width:768px){

.logo{
    font-size:42px;
    letter-spacing:5px;
}

.teaser{
    font-size:14px;
}

}

/* Grand écran */
@media (min-width:1440px){

.logo{
    font-size:96px;
    letter-spacing:10px;
}

}

</style>
